<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  body {
    margin: 0;
    height: 20000px;
  }
  .parent {
    width: 300px;
    height: 300px;
    background-color: yellow;
    position: relative;
    top: 0;
    left: 0;
  }
  /* position : relative : 내 원래의 위치를 기준으로 이동 */
  /* position : absolute : 나의 부모를 기준으로 이동 */
  /* 단 조상 중  position : relative로 선언된 곳이 기준 */
  /* position을 주면 공중에 붕 떠버린다. */
  .child {
    width: 50px;
    height: 50px;
    background-color: green;
    position: absolute;
    top: 40px;
    left: 20px;
  }

  /* 카톡 상담 배너 등 쓸 때 사용 */
  .fixed {
    position: fixed;
    top: 10px;
    left: 400px;
    background-color: red;
    width: 50px;
    height: 50px;
  }

  /* 상단 메뉴 / 테이블의 헤더 */
  .sticky {
    position: sticky;
    top: 100px;
    left: 500px;
    background-color: violet;
    width: 50px;
    height: 50px;
  }

</style>
<body>
  <div class="parent">
    <div class="child"></div>
  </div>
  <div class="sticky">sticky</div>
  <div class="fixed">fixed</div>
  <p>스크롤 해 보세요.</p>
</body>
</html>
