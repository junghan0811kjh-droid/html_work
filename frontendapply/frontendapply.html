<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/frontendapply.css">
  <script src="./js/frontendapply.js"></script>
  <title>프런트엔드 개발자 지원서</title>
</head>
<body>
  <div class="container">
    <form action="">

      <h1>프런트엔드 개발자 지원서</h1>
      <p>HTML, CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.</p>
      <p>______________________________________________________</p>
      
      <fieldset>
        <h3>개인정보</h3>
        <ul class="privacy">
          <li>
            <label for="name">이름</label>
            <input type="text" name="name" id="name" placeholder="공백없이 입력하세요">
          </li>
          <li>
            <label for="tel">연락처</label>
            <input type="tel" name="tel" id="tel">
          </li>
        </ul>
      </fieldset>
      

      
      <fieldset>
        <h3>지원 분야</h3>
        <ul>
          <li>
            <input type="radio" name="apply" id="publish">
            <label for="publish">웹 퍼블리싱</label>
          </li>
          <li>
            <input type="radio" name="apply" id="appdevelop">
            <label for="appdevelop">웹 애플리케이션 개발</label>
          </li>
          <li>
            <input type="radio" name="apply" id="advance">
            <label for="advance">개발 환경 개선</label>
          </li>
        </ul>
      </fieldset> 

      <fieldset>
        <h3>지원동기</h3>
        <textarea name="motivation" id="motivation" rows="5" cols="50" placeholder="본사 지원 동기를 간략히 써 주세요."></textarea>
      </fieldset>
      
      <div class="buttons">
        <input type="submit" value="접수하기" name="submit" id="submit">
        <input type="reset" value="다시 쓰기" name="reset" id="reset" >
      </div>
    </form>
  </div>
</body>
</html>
